<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Smart Movies</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin-dashboard.css" />
</head>
<body class="admin-body">
  <header class="navbar">
    <div class="nav-brand">
      <div class="logo">SM</div>
      <span class="brand-text">Smart Movies Admin</span>
    </div>

    <nav class="nav-links wishlist-nav">
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main class="admin-shell">
    <section class="admin-hero">
      <div>
        <span class="search-eyebrow">Admin Dashboard</span>
        <h1>Movie CRUD</h1>
        <p>Add, edit, delete, and search movies in the catalog.</p>
      </div>
      <button class="admin-primary-btn" id="newMovieBtn" type="button">Add Movie</button>
    </section>

    <section class="admin-grid">
      <form class="admin-form glass-card" id="movieForm">
        <div class="section-head">
          <h2 id="formTitle">Add Movie</h2>
          <span class="section-sub" id="formStatus">Catalog record</span>
        </div>

        <input type="hidden" id="movieIdInput" />

        <div class="admin-form-fields">
          <label>
            Title
            <input type="text" id="titleInput" placeholder="Movie title" required />
          </label>
          <label>
            Year
            <input type="number" id="yearInput" placeholder="2026" min="1900" max="2100" required />
          </label>
          <label>
            Rating
            <input type="text" id="ratingInput" placeholder="7.5" />
          </label>
          <label>
            Popularity
            <input type="number" id="popularityInput" placeholder="100" step="0.01" />
          </label>
          <label class="full-width">
            Poster URL
            <input type="text" id="posterInput" placeholder="https://image.tmdb.org/..." />
          </label>
          <label class="full-width">
            Description
            <textarea id="descriptionInput" placeholder="Movie description"></textarea>
          </label>
        </div>

        <div class="admin-form-actions">
          <button class="admin-primary-btn" type="submit">Save Movie</button>
          <button class="admin-secondary-btn" id="resetFormBtn" type="button">Reset</button>
        </div>
      </form>

      <section class="admin-table-card glass-card">
        <div class="admin-table-top">
          <div>
            <h2>Movie List</h2>
            <p id="adminCount">0 movies</p>
          </div>
          <input type="text" id="adminSearchInput" placeholder="Search movie..." />
        </div>

        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Movie</th>
                <th>Year</th>
                <th>Rating</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminMovieTable">
              <tr>
                <td colspan="4">Loading movies...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>

    <section class="admin-feedback-card glass-card">
      <div class="admin-table-top">
        <div>
          <h2>User Feedback</h2>
          <p>Latest comments submitted from Settings.</p>
        </div>
      </div>
      <div class="admin-feedback-list" id="adminFeedbackList">
        <div class="feedback-empty">No feedback submitted yet.</div>
      </div>
    </section>
  </main>

  <script src="movieData.js"></script>
  <script src="admin-dashboard.js"></script>
</body>
</html>
